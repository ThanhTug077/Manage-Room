<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DormManager - Tra cứu sinh viên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .student-login-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .student-login-panel { width: 100%; max-width: 420px; padding: 2.5rem; border-radius: 16px; background: var(--card-bg, #1a1d23); border: 1px solid var(--border-color, #2a2d35); }
    .student-content { display: none; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
    .info-card { padding: 1rem 1.25rem; border-radius: 12px; background: var(--card-bg, #1a1d23); border: 1px solid var(--border-color, #2a2d35); }
    .info-card .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted, #888); font-family: 'Inter', system-ui, sans-serif; }
    .info-card .value { font-size: 1.1rem; font-weight: 600; margin-top: .25rem; font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">DormManager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#studentNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="studentNav">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="index.html">Trang chủ</a>
          <a class="nav-link active" href="student.html">Tra cứu</a>
          <a class="nav-link" href="admin.html">Quản lý</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="app-shell" style="padding-top: 100px;">
    <!-- Login -->
    <section id="studentLoginSection" class="student-login-shell">
      <div class="student-login-panel">
        <h3 class="mb-1">Tra cứu thông tin</h3>
        <p class="text-muted mb-4">Nhập mã số sinh viên để xem thông tin phòng và thanh toán.</p>
        <form id="studentLoginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="studentCodeInput">Mã số sinh viên</label>
            <input id="studentCodeInput" class="form-control" type="text" placeholder="VD: 1971040034" required autocomplete="username">
            <div class="invalid-feedback">Vui lòng nhập mã số sinh viên.</div>
          </div>
          <button class="btn btn-primary w-100" type="submit">Tra cứu</button>
        </form>
        <div class="mt-3 text-center">
          <a href="index.html" class="text-muted small">&larr; Quay lại trang chủ</a>
        </div>
      </div>
    </section>

    <!-- Dashboard -->
    <section id="studentDashboard" class="student-content container" style="padding-bottom: 3rem;">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h1 class="h4 mb-1" id="studWelcome">Xin chào</h1>
          <p class="text-muted mb-0">Thông tin đăng ký ký túc xá</p>
        </div>
        <button id="studentLogoutBtn" class="btn btn-outline-secondary btn-sm">Đăng xuất</button>
      </div>

      <div class="info-grid" id="studentInfoGrid">
        <div class="info-card"><div class="label">Họ tên</div><div class="value" id="sFullName">—</div></div>
        <div class="info-card"><div class="label">Mã SV</div><div class="value" id="sStudentCode">—</div></div>
        <div class="info-card"><div class="label">Phòng</div><div class="value" id="sRoomName">—</div></div>
        <div class="info-card"><div class="label">Trạng thái</div><div class="value" id="sStatus">—</div></div>
      </div>

      <div class="card" style="background:var(--card-bg,#1a1d23);border:1px solid var(--border-color,#2a2d35);border-radius:12px;">
        <div class="card-body">
          <h5 class="card-title">Thông tin thanh toán</h5>
          <div id="studentPaymentInfo">
            <p class="text-muted mb-0">Đang tải...</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="toastContainer" class="toast-container position-fixed p-3" style="top:70px;right:16px;z-index:9999"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
